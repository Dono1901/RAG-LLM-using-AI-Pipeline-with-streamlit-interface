name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
    paths:
      - "financial-report-insights/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "financial-report-insights/**"

defaults:
  run:
    working-directory: financial-report-insights

# Cancel superseded runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1: Lint & Static Analysis
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: financial-report-insights/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: MyPy type check (structured_types)
        run: mypy structured_types.py --ignore-missing-imports --no-error-summary || true

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Security Scanning
  # ──────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: financial-report-insights/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit safety pip-audit

      - name: Bandit security scan
        run: bandit -r . -x ./tests -f json -o bandit-report.json --severity-level medium || true

      - name: pip-audit dependency scan
        run: pip-audit --requirement requirements.txt --output json --desc > pip-audit-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            financial-report-insights/bandit-report.json
            financial-report-insights/pip-audit-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Stage 3: Test Suite
  # ──────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: financial-report-insights/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -q --tb=short \
            --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing \
            -n auto \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            financial-report-insights/test-results.xml
            financial-report-insights/coverage.xml
          retention-days: 30

      - name: Coverage summary
        if: matrix.python-version == '3.12'
        run: |
          pip install coverage
          python -m coverage report --fail-under=60 || echo "::warning::Coverage below 60%"

  # ──────────────────────────────────────────────────────────────
  # Stage 4: Build Validation
  # ──────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: financial-report-insights
          push: false
          tags: rag-financial-insights:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify image
        run: |
          docker images rag-financial-insights:${{ github.sha }}
          echo "Image built successfully"

  # ──────────────────────────────────────────────────────────────
  # Stage 5: Quality Gate
  # ──────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, security, test, build]
    if: always()
    steps:
      - name: Check all stages
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [[ "${{ needs.lint.result }}" == "failure" ]]; then
            echo "::error::Lint stage failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "::error::Test stage failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "::error::Build stage failed"
            exit 1
          fi
          # Security is advisory (doesn't block)
          if [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "::warning::Security scan had issues — review artifacts"
          fi

          echo "✅ Quality gate passed"
